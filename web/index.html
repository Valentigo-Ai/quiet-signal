<!doctype html>
<!--
  Recipient-side no-login view (Section 4.3 / Flow C).
  Static page, no build step - deploy anywhere (Vercel/Netlify/GitHub Pages/
  even Supabase Storage). Reads ?token= from the URL, calls the
  get-shared-message edge function, and renders just that one message -
  never the sender's full history, unless full_history_access was granted.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quiet Signal - check-in</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0B1128;
    color: #EEF1FC;
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #151D3E;
    border: 1px solid #2C3560;
    border-radius: 20px;
    padding: 32px 24px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(4,8,24,0.5);
  }
  .label { color: #A9B4DC; font-size: 14px; margin-bottom: 8px; }
  .message { font-size: 20px; line-height: 1.5; margin-bottom: 16px; }
  .timestamp { color: #8FA0D8; font-size: 13px; }
  .error { color: #E08079; }
  .history-item { padding: 8px 0; border-top: 1px solid #2C3560; }
  .support-note {
    max-width: 420px;
    width: 100%;
    text-align: center;
    color: #7C87B0;
    font-size: 12px;
    line-height: 1.6;
    margin-top: 16px;
    padding: 0 12px;
  }
  .support-note a { color: #A9B4DC; }
  .page { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="page">
    <div class="card" id="card">
      <div class="label">Loading…</div>
    </div>
    <!--
      Samaritans mapping (docs/crisis-wordlist-review.md, guideline 4 -
      "user-friendly reporting"): a recipient reading a worrying check-in
      here had no in-product guidance. This line is always shown, on every
      load (success, error, or empty), because we never expose the sender's
      private flagged_crisis status to a recipient - that would be a privacy
      violation and this app makes no diagnostic claims. Findahelpline.com
      (run by ThroughLine, partnered with IASP) is used because it's a
      verified international directory covering 175+ countries, which a
      single recipient's country can't be assumed from a check-in link.
    -->
    <div class="support-note">
      If you're ever worried about someone after reading a message here,
      <a href="https://findahelpline.com" target="_blank" rel="noopener">findahelpline.com</a>
      has free, confidential crisis support services in most countries. In an emergency, contact
      your local emergency number.
    </div>
  </div>

  <script>
    // Replace with your deployed Supabase project URL if different.
    const FUNCTION_BASE = "https://bzczbsrtbnqiydscvnak.supabase.co/functions/v1/get-shared-message";

    // Escape anything user-authored before it goes through innerHTML.
    // message_text (and recipient_label) are written by the SENDER, so
    // without this a sender could put e.g. <img onerror=...> in an edited
    // message and have script run in their recipient's browser on this
    // page (stored XSS). Everything user-authored below goes through this.
    const esc = (s) =>
      String(s ?? "").replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]),
      );

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const card = document.getElementById("card");

    if (!token) {
      card.innerHTML = '<div class="label error">Missing link token.</div>';
    } else {
      fetch(`${FUNCTION_BASE}?token=${encodeURIComponent(token)}`)
        .then((r) => r.json())
        .then((data) => {
          if (data.error) {
            card.innerHTML = '<div class="label error">This link has expired or is invalid.</div>';
            return;
          }
          const label = data.recipient_label ? `${esc(data.recipient_label)}, here's today's check-in:` : "Today's check-in:";
          let html = `
            <div class="label">${label}</div>
            <div class="message">${esc(data.message)}</div>
            <div class="timestamp">Sent ${new Date(data.sent_at).toLocaleString()}</div>
          `;
          if (data.recent_history && data.recent_history.length > 0) {
            html += '<div class="label" style="margin-top:20px;">Recent check-ins</div>';
            for (const h of data.recent_history) {
              html += `<div class="history-item">${esc(h.message_text)}<br/><span class="timestamp">${new Date(h.sent_at).toLocaleDateString()}</span></div>`;
            }
          }
          card.innerHTML = html;
        })
        .catch(() => {
          card.innerHTML = '<div class="label error">Couldn\'t load this check-in. Please try again later.</div>';
        });
    }
  </script>
</body>
</html>
